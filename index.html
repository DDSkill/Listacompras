<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Lista de Compras Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .date-display { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-top: 5px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .action-bar {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            background: var(--card);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        #btn-voice {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #btn-voice.listening { background: var(--danger); animation: pulse 1.5s infinite; }

        #btn-clear-all {
            width: 42px;
            height: 42px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: #fff;
            color: var(--danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .list-container { flex: 1; padding: 0 20px 40px; }
        
        .category-group { margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        
        .category-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--text-muted); 
            padding: 12px;
            background: #f9fafb;
            text-transform: uppercase;
            cursor: pointer;
        }

        .category-header span { display: flex; align-items: center; gap: 8px; }

        .collapsed ul { display: none; }
        .chevron { transition: transform 0.3s; }
        .collapsed .chevron { transform: rotate(-90deg); }

        ul { list-style: none; padding: 0; margin: 0; background: #fff; }

            padding: 12px;
